name: Hogwarts
options:
  bundleIdPrefix: org.databayt
  # iOS 18 is the minimum so teachers/parents on a year-old device still
  # qualify; iOS 26 features are gated behind @available(iOS 26, *).
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # APNs environment defaults to sandbox in Debug, production elsewhere.
    # xcconfig (CORE-009) will eventually drive these per-config.
    APS_ENVIRONMENT: development
  configs:
    Release:
      APS_ENVIRONMENT: production
    # Swift 6.2 + Xcode 26 "approachable concurrency": the language mode
    # turns warnings into errors, MainActor is the default isolation, and
    # the two upcoming features below close the remaining holes that the
    # 6.0 migration left behind.
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_UPCOMING_FEATURE_NonisolatedNonsendingByDefault: YES
    SWIFT_UPCOMING_FEATURE_InferSendableFromCaptures: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_NSCameraUsageDescription: "Camera access is needed for QR code attendance check-in"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"
  FacebookLogin:
    url: https://github.com/facebook/facebook-ios-sdk
    from: "16.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.36.0"

targets:
  Hogwarts:
    type: application
    platform: iOS
    sources:
      - path: hogwarts
        excludes:
          - "**/.DS_Store"
    resources:
      - path: hogwarts/resources
        excludes:
          - "**/.DS_Store"
    info:
      path: hogwarts/resources/Info.plist
      properties:
        CFBundleDisplayName: Hogwarts
        CFBundleName: Hogwarts
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: ar
        CFBundleAllowMixedLocalizations: true
        CFBundleLocalizations:
          - ar
          - en
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Camera access is needed for QR code attendance check-in"
        NSPhotoLibraryUsageDescription: "Photo library access is needed to attach documents to admission applications and profile photos."
        NSPhotoLibraryAddUsageDescription: "Save shared documents (ID cards, receipts, report cards) to your photo library."
        NSCalendarsWriteOnlyAccessUsageDescription: "Allow Hogwarts to add school events to your calendar."
        # AUTH-005 — BiometricService is wired into ContentView; without this
        # key, the Face ID prompt is suppressed by iOS without a useful error.
        NSFaceIDUsageDescription: "Use Face ID to unlock Hogwarts and approve sensitive school actions."
        ITSAppUsesNonExemptEncryption: false
        GIDClientID: "GOOGLE_CLIENT_ID"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.GOOGLE_CLIENT_ID"
              - "fb$(FACEBOOK_APP_ID)"
        FacebookAppID: "$(FACEBOOK_APP_ID)"
        FacebookClientToken: "$(FACEBOOK_CLIENT_TOKEN)"
        FacebookDisplayName: Hogwarts
        # Sentry DSN — set per-environment via xcconfig or App Store Connect.
        # Empty string disables crash reporting (Sentry init is no-op).
        SENTRY_DSN: "$(SENTRY_DSN)"
        SENTRY_ENVIRONMENT: "$(CONFIGURATION)"
    entitlements:
      path: hogwarts/resources/Hogwarts.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        keychain-access-groups:
          - $(AppIdentifierPrefix)org.databayt.Hogwarts
        # APNs environment — Debug uses sandbox, Release uses production.
        # Without this entitlement, AppDelegate.didRegisterForRemoteNotifications
        # never fires on real devices. PUSH-001 / SHIP gate.
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.databayt.Hogwarts
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: GoogleSignIn
      - package: FacebookLogin
        product: FacebookLogin
      - package: Sentry
        product: Sentry

  HogwartsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HogwartsTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Hogwarts

  HogwartsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HogwartsUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Hogwarts

schemes:
  Hogwarts:
    build:
      targets:
        Hogwarts: all
        HogwartsTests: [test]
        HogwartsUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HogwartsTests
        - HogwartsUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
