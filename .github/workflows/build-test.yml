name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode (pinned to 16.0 — matches when branch was verified)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -scheme Hogwarts \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -skipPackagePluginValidation

      - name: Unit Tests
        run: |
          xcodebuild test \
            -scheme Hogwarts \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:HogwartsTests \
            -skipPackagePluginValidation

      - name: UI Tests
        run: |
          xcodebuild test \
            -scheme Hogwarts \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:HogwartsUITests \
            -skipPackagePluginValidation
