# Cross-Cutting Invariants (apply to every story)
cross_cutting:
  i18n_rtl:
    enforced_by: scripts/audit-i18n-hardcoded.sh, scripts/check-string-parity.sh
    target_parity: 0.99
    namespaces: [admin, attendance, auth, banking, common, errors, finance, generate, home, lab, library, marking, messages, messaging, notifications, onboarding, profile, results, sales, transportation, whatsapp]
  content_translation:
    enforced_by: per-entity lang field render + on-demand translate banner
    backend_endpoint: POST /api/mobile/translate (NEW — see docs/backend-gaps.md)
  multi_tenancy:
    enforced_by: scripts/audit-tenant-scope.sh, TenantContext.shared, schoolId predicate
  roles:
    enforced_by: docs/roles.md frontmatter declaration, core/auth/authorization.swift
    supported: [DEVELOPER, ADMIN, TEACHER, STUDENT, GUARDIAN, ACCOUNTANT, STAFF, USER]
  audit_log:
    enforced_by: core/audit/audit-log.swift writes on every mutation
  api_contract:
    enforced_by: .claude/rules/api-mobile.md
    base_url: https://kingfahad.databayt.org/api/mobile/

# Phasing
milestones:
  M0:
    name: Pilot Bring-up
    duration_weeks: 10-14
    goal: TestFlight private beta — student/parent/teacher read-only with full RTL + push + offline + GOV
    blocking_backend_tickets:
      - POST /api/mobile/translate (NEW)
      - POST /api/mobile/account/delete
      - GET /api/mobile/account/export
      - POST /api/mobile/consent/*
  M1:
    name: Pilot Pro
    duration_weeks: 8-12
    goal: Public TestFlight — teacher MVP + Apple Pay + widgets + live activities
    blocking_backend_tickets:
      - POST /api/mobile/teacher/classes/:id/grades
      - POST /api/mobile/teacher/classes/:id/attendance
      - GET /api/mobile/invoices/*
      - POST /api/mobile/payments/*
      - GET /api/mobile/report-cards/*
      - GET /api/mobile/teacher/schedule
  M2:
    name: Expansion + Watch + Vertical Depth
    duration_weeks: 12-16
    goal: Feature parity with kotlin v2 + Apple Watch + AI doc + admission

